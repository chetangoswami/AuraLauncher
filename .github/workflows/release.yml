name: Build and Release APK

on:
  push:
    tags:
      - 'v*' # This workflow runs automatically whenever you push a tag starting with 'v'

jobs:
  build:
    name: Build APK and Create Release
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required to allow GitHub Actions to create the release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Build APK (Debug)
        run: ./gradlew assembleDebug
        # Note: We are building the Debug APK here to avoid requiring Android Keystore setup for now.
        # This is perfectly fine for community open-source alpha/beta distribution.

      - name: Extract Tag Name
        id: get_tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename APK for Release
        run: mv app/build/outputs/apk/debug/app-debug.apk AuraLauncher-${{ steps.get_tag.outputs.TAG }}.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Aura Launcher ${{ steps.get_tag.outputs.TAG }}
          files: AuraLauncher-${{ steps.get_tag.outputs.TAG }}.apk
          generate_release_notes: true
